<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { border: 2px solid #00ffcc; padding: 30px; box-shadow: 0 0 20px #00ffcc; width: 350px; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #222; border: 1px solid #00ffcc; color: #fff; }
        button { cursor: pointer; background: #00ffcc; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>PORTAL LOGIN</h2>
        <input type="text" id="userid" placeholder="Roll No">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">LOGIN</button>
    </div>

    <script>
        async function login() {
            const id = document.getElementById('userid').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: id, role: 'student'})
            });
            const data = await res.json();
            if(data.success) alert("Logged In!");
        }
    </script>
</body>
</html>
