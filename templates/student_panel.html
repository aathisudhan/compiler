<!DOCTYPE html>
<html>
<head>
    <style>
        .editor-container { width: 80%; margin: 20px auto; }
        textarea { width: 100%; height: 300px; background: #111; color: #fff; border: 1px solid #333; }
        #output { border-top: 2px solid #333; padding: 10px; color: #fff; }
    </style>
</head>
<body>
    <div class="editor-container">
        <h3>Solve: [Question Title Here]</h3>
        <textarea id="codeEditor"></textarea>
        <button onclick="submitCode()">SUBMIT & RUN</button>
        <div id="output">Output will appear here...</div>
    </div>

    <script>
        async function submitCode() {
            const code = document.getElementById('codeEditor').value;
            const res = await fetch('/api/submit_code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code: code, language: 'python', question_id: 'Q1'})
            });
            const result = await res.json();
            document.getElementById('output').innerText = `Output: ${result.output}\nMarks: ${result.marks}`;
        }
    </script>
</body>
</html>
